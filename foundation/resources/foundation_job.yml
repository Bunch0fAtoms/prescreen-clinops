resources:
  jobs:
    foundation_setup_job:
      name: "[${bundle.target}] Prescreen ClinOps: stand up the shared foundation"
      description: >
        Stands up the shared data foundation the ML notebooks build on. One task,
        generate_omop_data, writes the 6 synthetic OMOP CDM tables (300 breast-cancer
        patients). It is deterministic (seed=42), so re-running rewrites the identical
        tables. Only needed when run_with_synthetic_data=yes; when =no, the generator
        no-ops and downstream tools read the 6 OMOP tables from
        ${var.source_catalog}.${var.source_schema} (your own OMOP source tables).

      tasks:
        - task_key: generate_omop_data
          spark_python_task:
            python_file: ../src/data_generation/generate_omop_data.py
            parameters:
              - "${var.client_catalog}"
              - "${var.client_schema}"
              # run_with_synthetic_data: "no" makes the generator no-op (real OMOP is read
              # downstream from source_catalog.source_schema).
              - "${var.run_with_synthetic_data}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "3"
            dependencies:
              - "faker>=20.0.0"
              - "numpy>=1.26"
              - "pandas>=2.0"
              - "pyarrow>=4.0.0"

      permissions:
        - level: CAN_VIEW
          group_name: "users"
