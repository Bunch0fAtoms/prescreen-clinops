bundle:
  name: fred-hutch-prescreen-foundation

include:
  - resources/*.yml

# ── Sync the Admin session's cost SQL alongside the foundation ──────────────────
# The Admin (Genie One) session does not use the foundation's clinical data. It
# reads system.billing. But it still needs its two trusted SQL files in the
# workspace. Rather than have admins clone the repo or run a second bundle, we
# carry those files along with this one foundation deploy. After deploy they land
# at: <workspace files root>/kits/admin-session-starter-kit/sql/*.sql
# (the files root is shown by `databricks bundle validate`; by default it is
#  /Workspace/Users/<deployer>/.bundle/fred-hutch-prescreen-foundation/client/files).
# Adding a path outside foundation/ moves the sync root up to the repo, so the
# foundation's own files nest under files/foundation/. The CLI rewrites every
# internal reference, so the job still resolves; only the deployed path changes.
sync:
  paths:
    - .
    - ../kits/admin-session-starter-kit/sql

variables:
  # ── Synth / real toggle ─────────────────────────────────────────────────────
  # Set run_with_synthetic_data=yes  → run the generation job; downstream tools
  #   read from client_catalog.client_schema (synthetic OMOP data).
  # Set run_with_synthetic_data=no   → skip generation; downstream tools read
  #   from source_catalog.source_schema (your real curated_omop.omop tables).
  # The 6 table names are identical in both cases — no query changes required.
  run_with_synthetic_data:
    description: >
      yes = use bundled synthetic data generator (recommended for first run).
      no = read from source_catalog.source_schema (your real OMOP tables).
    default: "yes"

  source_catalog:
    description: >
      Source catalog for your real OMOP data.
      Only used when run_with_synthetic_data=no. Default: curated_omop.
    default: "curated_omop"

  source_schema:
    description: >
      Source schema for your real OMOP data.
      Only used when run_with_synthetic_data=no. Default: omop.
    default: "omop"

  # ── Client catalog / schema (where demo tables are created) ─────────────────
  client_catalog:
    description: "Your Unity Catalog catalog (where the demo will create tables)"
    default: "<your_catalog>"

  client_schema:
    description: "Your schema (created inside client_catalog if it doesn't exist)"
    default: "clinops_foundation"

  warehouse_id:
    description: "SQL Warehouse ID for queries and dashboard"
    default: "<your_warehouse_id>"

targets:
  # ── Client target (default) — fill in your workspace values below, then: ────
  #   databricks bundle deploy --target client
  #   databricks bundle run foundation_setup_job --target client
  #
  # Genie Code can auto-detect these via the `fred-hutch-onsite-adaptation` skill —
  # open Genie Code and ask: "run in my workspace"
  client:
    default: true
    # Omit `mode:` — DAB defaults to production behavior (no dev_<username>_ prefixing).
    # No `workspace.host:` — the CLI uses your profile's host (databricks bundle deploy
    # --target client -p <profile>), so there's no host to mismatch. Add one only if you
    # deploy without a profile.
    workspace:
      # Deploy to a SHARED workspace folder, not the deployer's personal home.
      # One person (e.g. a governance-group member) runs this setup once on Day 1, and
      # all four groups need to reach the deployed assets, including the Admin SQL synced
      # above. Without this, everything would land under
      # /Workspace/Users/<deployer>/.bundle/... where other groups may not have read
      # access. Requirement: the deployer can write to /Workspace/fh-onsite (creating the
      # folder is enough), then grants the four groups CAN_READ on it once.
      root_path: /Workspace/fh-onsite/prescreen/${bundle.target}
    #
    # Fill in your own workspace values before deploying. Two ways:
    #   1. Edit the variable `default:`s above (client_catalog, warehouse_id), or
    #   2. Pass them at deploy time, e.g.:
    #        databricks bundle deploy --target client -p <profile> \
    #          --var="client_catalog=<your_catalog>,warehouse_id=<your_warehouse_id>"
    # The foundation job fails fast if client_catalog is left as "<your_catalog>",
    # so an unconfigured deploy stops with a clear message instead of a confusing error.
