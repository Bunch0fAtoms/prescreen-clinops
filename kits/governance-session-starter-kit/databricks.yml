# ─────────────────────────────────────────────────────────────────────────────
# Databricks Asset Bundle: Fred Hutch Governance Session (UC governance on OMOP)
#
# OPTIONAL FACILITATOR-BACKUP PATH ONLY. The PRIMARY governance session governs the
# SHARED FOUNDATION's 6 OMOP tables IN PLACE (Genie-Code-driven, no bundle, no clone),
# so the policy affects the shared data every track reads. See README.md / SESSION_BRIEF.html.
# This bundle exists as a backup that clones the 6 tables into a separate schema so a
# facilitator can demonstrate the same masks/filters in isolation if needed. Do NOT run it
# for the primary in-place path. To use the backup:
#   1. Fill in the `client` target's client_catalog / client_schema / warehouse_id / ocdo_group.
#   2. databricks bundle deploy --target client
#   3. databricks bundle run setup_clone_job --target client   (clones the 6 OMOP tables)
# Then open notebooks/00_START_HERE and set the matching widgets.
# ─────────────────────────────────────────────────────────────────────────────
bundle:
  name: fred-hutch-governance-session

include:
  - resources/*.yml

variables:
  # ── Source OMOP schema to clone the 6 governed tables FROM ───────────────────
  # The setup job DEEP CLONEs these 6 tables into client_catalog.client_schema so you can apply
  # masks/row filters in ISOLATION (never on a schema another track depends on).
  source_catalog:
    description: "Catalog holding the existing 6 OMOP tables to clone from."
    default: "<your_catalog>"
  source_schema:
    description: "Schema holding the existing 6 OMOP tables (e.g. the shared foundation schema)."
    default: "<your_source_schema>"

  # ── Client (per-team) governance catalog / schema, where YOU apply policies ──
  client_catalog:
    description: "Your team's Unity Catalog catalog."
    default: "<your_catalog>"
  client_schema:
    description: "Your team's governance schema (the clones + your masks/filters land here)."
    default: "clinops_gov"

  warehouse_id:
    description: "SQL Warehouse ID for the %sql cells and the system-table audits."
    default: "<your_warehouse_id>"

  ocdo_group:
    description: >
      The OCDO researcher account group that masks & row filters gate on
      (is_account_group_member). Does not need members for the build.
    default: "ocdo_data_scientists"

targets:
  # ── Client target (default). Fill in your workspace values, then deploy. ────
  client:
    default: true
    # Omit `mode:`. DAB defaults to production behavior (no dev_<user>_ prefix), which keeps
    # table names stable so the masks/filters bind to predictable objects.
    # No `workspace.host:`. The CLI uses your profile's host (deploy with -p <profile>),
    # so there's no host to mismatch. Add one only if you deploy without a profile.
    variables:
      source_catalog: "<your_catalog>"
      source_schema: "<your_source_schema>"
      client_catalog: "<your_catalog>"
      client_schema: "clinops_gov"
      warehouse_id: "<your_warehouse_id>"
      ocdo_group: "ocdo_data_scientists"
