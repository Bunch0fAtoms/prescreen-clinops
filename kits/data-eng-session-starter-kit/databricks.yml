# ─────────────────────────────────────────────────────────────────────────────
# Databricks Asset Bundle — Fred Hutch OMOP Ingestion (Data Engineering session)
#
# This bundle is PRE-BUILT for you. It is Unity-Catalog-scoped (catalog/schema are
# variables — no hive_metastore, no hardcoded workspace), per-team, and reads the
# 6 OMOP source tables read-only while writing everything to YOUR own schema.
# To use it:
#   1. Fill in the `client` target's client_catalog / client_schema / source_schema / warehouse_id.
#   2. databricks bundle deploy --target client
#   3. Open notebooks/00_START_HERE, set the widgets, run the foundation check.
# ─────────────────────────────────────────────────────────────────────────────
bundle:
  name: fred-hutch-omop-data-eng-session

include:
  - resources/*.yml

variables:
  # ── Source (read-only) OMOP tables you ingest FROM ───────────────────────────
  # The 6 OMOP tables live here and are READ-ONLY. You never modify this schema.
  source_schema:
    description: "Read-only schema holding the 6 OMOP source tables (person, condition_occurrence, ...)."
    default: "clinops_foundation"

  # ── Client (per-team) catalog / schema — where YOU write ─────────────────────
  # FILL THESE IN. Bronze landing, evolved tables, reconciliation outputs, and the
  # ingest allow-list config all get created here. No hive_metastore.
  client_catalog:
    description: "Your team's Unity Catalog catalog (source and target both live under it)."
    default: "<your_catalog>"

  client_schema:
    description: "Your team's WRITABLE schema (bronze + recon + config tables are created here)."
    default: "clinops_de"

  warehouse_id:
    description: "SQL Warehouse ID for ad-hoc SQL and the Genie/recon queries."
    default: "<your_warehouse_id>"

targets:
  # ── Client target (default) — fill in your workspace values, then deploy. ────
  # Per-team isolation: give each team its own writable schema so nobody steps on
  # anybody else's bronze/recon/config tables. The source_schema is shared + read-only.
  client:
    default: true
    # Omit `mode:` — DAB defaults to production behavior (no dev_<user>_ prefix),
    # keeping table names stable for the recon summary and the SLA job.
    # No `workspace.host:` — the CLI uses your profile's host (deploy with -p <profile>),
    # so there's no host to mismatch. Add one only if you deploy without a profile.
    variables:
      client_catalog: "<your_catalog>"
      client_schema: "clinops_de"
      source_schema: "clinops_foundation"
      warehouse_id: "<your_warehouse_id>"
