resources:
  jobs:
    data_generation_job:
      name: "[${bundle.target}] Fred Hutch OMOP Synthetic Data Generation"
      description: >
        Generates 300 synthetic breast-cancer patients into the 6 OMOP CDM tables.
        Only needs to run when run_with_synthetic_data=yes. When run_with_synthetic_data=no,
        downstream tools read from ${var.source_catalog}.${var.source_schema} instead.

      tasks:
        - task_key: generate_omop_data
          spark_python_task:
            python_file: ../src/data_generation/generate_omop_data.py
            parameters:
              - "${var.client_catalog}"
              - "${var.client_schema}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "3"
            dependencies:
              - "faker>=20.0.0"
              - "numpy>=1.26"
              - "pandas>=2.0"
              - "pyarrow>=4.0.0"

      permissions:
        - level: CAN_VIEW
          group_name: "users"
